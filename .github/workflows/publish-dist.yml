name: Build and Publish Dist Branch

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: |
          npm run build
          echo "Listing after build:"
          ls
          echo "Listing dist:"
          ls dist || echo "dist does not exist"

      - name: Publish dist to deploy branch
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Current dir at start of publish:"
          pwd
          echo "Root listing:"
          ls

          # Copy built files to a temporary folder while we are still on main
          rm -rf deploy-tmp
          mkdir deploy-tmp
          cp -R dist/* deploy-tmp/

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Use token-based URL for authenticated pushes
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

          git fetch origin

          # Switch to deploy branch if it exists, otherwise create it
          if git show-ref --verify --quiet refs/heads/deploy; then
            git switch deploy
          else
            git checkout --orphan deploy
          fi

          # Clean deploy branch contents
          git rm -rf . || true
          rm -rf ./*

          # Copy from temporary folder into deploy branch working tree
          cp -R ../deploy-tmp/* .

          git add .
          git commit -m "Deploy from main" || echo "Nothing to commit"

          git push --force origin deploy
