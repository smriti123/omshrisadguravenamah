name: Build and Publish Dist Branch

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: |
          npm run build
          echo "Listing after build (root):"
          pwd
          ls
          echo "Listing dist:"
          ls dist || echo "dist does not exist"

      - name: Publish dist to deploy branch
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Publish step start, root dir:"
          pwd
          ls

          # Configure git and authenticated remote
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

          # Fetch remote branches
          git fetch origin

          # Clean any previous worktree
          git worktree remove deploy-worktree || true
          rm -rf deploy-worktree || true

          # Create worktree for deploy branch
          if git show-ref --verify --quiet refs/remotes/origin/deploy; then
            git worktree add deploy-worktree origin/deploy
          else
            git worktree add -b deploy deploy-worktree origin/main
          fi

          echo "Worktree created at:"
          ls

          # Copy built files into worktree
          cd deploy-worktree
          pwd
          rm -rf ./*
          cp -R ../dist/* .

          git add .
          git commit -m "Deploy from main" || echo "Nothing to commit"
          git push origin HEAD:deploy
